---
name: Build
'on':
  push:
    branches:
    - main
    tags:
    - "**"
  pull_request:
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.5'
        bundler-cache: true
    - name: Build
      run: bundle exec rake
    - name: Bump version and push tag
      if: github.ref == 'refs/heads/main'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        tag_prefix: ''
    - name: Set module version and release
      if: github.ref_type == 'tag'
      run: |
        jq ".version = \"${GITHUB_REF#refs/tags/}\"" metadata.json > tmp.json && mv tmp.json metadata.json
        bundle exec rake release_from_tag
      env:
        BLACKSMITH_FORGE_API_KEY: "${{ secrets.BLACKSMITH_FORGE_API_KEY }}"
    - name: Post to hook-exporter
      if: github.ref == 'refs/heads/main'
      run: "./.github/exporter.sh"
      env:
        EXPORTER_TOKEN: "${{ secrets.EXPORTER_TOKEN }}"
        JOB_STATUS: "${{ job.status }}"
