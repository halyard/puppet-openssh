---
name: Release
'on':
  push:
    tags:
    - "**"
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
    - name: Run base CI
      uses: akerl/.github/actions/base-ruby@main
    - name: Authenticate to Github App
      uses: akerl/.github/actions/github-app-auth@main
      with:
        client-id: ${{ secrets.APP_CLIENT_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - name: Publish release
      uses: akerl/.github/actions/puppet-release@main
      with:
        api_key: ${{ secrets.BLACKSMITH_FORGE_API_KEY }}
